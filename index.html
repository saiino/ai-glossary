<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI用語 学習トラッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600&family=IBM+Plex+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAF9F5;
    --ink: #23282F;
    --ink-soft: #6B7280;
    --line: #E5E2D9;
    --l0: #D9D6CC;
    --l1: #E8B04B;
    --l2: #4E9B8F;
    --l3: #1F6E5C;
    --card: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "IBM Plex Sans JP", sans-serif;
    line-height: 1.7;
    padding: 24px 16px 64px;
    max-width: 720px;
    margin: 0 auto;
  }
  body.modal-open { overflow: hidden; }
  header h1 {
    font-family: "Shippori Mincho", serif;
    font-size: 1.5rem;
    letter-spacing: 0.06em;
  }
  header p.sub {
    color: var(--ink-soft);
    font-size: 0.8rem;
    margin-top: 2px;
  }

  /* 習熟度ヒートストリップ(このページの顔) */
  .heatstrip {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin: 20px 0 8px;
  }
  .heatstrip .cell {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    cursor: pointer;
    border: none;
    transition: transform 0.1s ease;
  }
  .heatstrip .cell:hover, .heatstrip .cell:focus-visible {
    transform: scale(1.25);
    outline: 2px solid var(--ink);
    outline-offset: 1px;
  }
  .strip-caption {
    font-size: 0.72rem;
    color: var(--ink-soft);
    margin-bottom: 20px;
  }

  /* サマリー */
  .stats {
    display: flex;
    gap: 20px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 12px 0;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat .num {
    font-family: "IBM Plex Mono", monospace;
    font-size: 1.3rem;
    font-weight: 500;
  }
  .stat .label {
    font-size: 0.72rem;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .dot { width: 9px; height: 9px; border-radius: 3px; display: inline-block; }

  /* フィルタ・検索 */
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .chip {
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink);
  }
  .chip[aria-pressed="true"] {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  #search {
    flex: 1;
    min-width: 140px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.85rem;
    font-family: inherit;
    background: var(--card);
  }
  #search:focus { outline: 2px solid var(--l2); }
  #cat-controls { margin-top: -8px; }

  /* カテゴリーチップ(モーダル内) */
  .cat-chip {
    font-size: 0.7rem;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 999px;
    padding: 2px 10px;
    white-space: nowrap;
  }

  /* 用語行(コンパクト一覧) */
  .term-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    width: 100%;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    color: var(--ink);
  }
  .term-row:hover, .term-row:focus-visible {
    border-color: var(--ink-soft);
    outline: none;
  }
  .term-row:focus-visible { outline: 2px solid var(--l2); }
  .term-name { font-weight: 700; font-size: 1rem; }
  .level-chip {
    font-size: 0.7rem;
    font-weight: 500;
    color: #fff;
    border-radius: 999px;
    padding: 2px 10px;
    white-space: nowrap;
  }
  .level-chip.lv0 { background: var(--l0); color: var(--ink-soft); }
  .level-chip.lv1 { background: var(--l1); }
  .level-chip.lv2 { background: var(--l2); }
  .level-chip.lv3 { background: var(--l3); }
  .empty, .error {
    color: var(--ink-soft);
    font-size: 0.85rem;
    padding: 24px 0;
    text-align: center;
  }

  /* モーダル(下からのシート) */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(35, 40, 47, 0.45);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
  }
  .modal-backdrop[hidden] { display: none; }
  .modal-sheet {
    background: var(--paper);
    width: 100%;
    max-width: 720px;
    max-height: 85vh;
    overflow-y: auto;
    border-radius: 16px 16px 0 0;
    padding: 20px 20px 32px;
    animation: sheet-up 0.18s ease-out;
  }
  @keyframes sheet-up {
    from { transform: translateY(24px); opacity: 0.6; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .modal-title-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .modal-term {
    font-family: "Shippori Mincho", serif;
    font-size: 1.25rem;
    letter-spacing: 0.04em;
  }
  .modal-close {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 999px;
    width: 36px;
    height: 36px;
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    flex-shrink: 0;
  }
  .modal-close:hover, .modal-close:focus-visible {
    border-color: var(--ink);
    outline: none;
  }
  .modal-desc { font-size: 0.9rem; margin-top: 12px; }
  .related-section { margin-top: 16px; }
  .related-label {
    font-size: 0.72rem;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .related-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .related-tag {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 0.8rem;
    font-family: inherit;
    cursor: pointer;
  }
  .related-tag:hover, .related-tag:focus-visible {
    border-color: var(--ink);
    outline: none;
  }
  .modal-meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.68rem;
    color: var(--ink-soft);
    margin-top: 16px;
  }
  @media (min-width: 600px) {
    .modal-backdrop { align-items: center; padding: 24px; }
    .modal-sheet { border-radius: 16px; max-width: 520px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .heatstrip .cell { transition: none; }
    .modal-sheet { animation: none; }
  }
</style>
</head>
<body>
<header>
  <h1 id="title">AI用語 学習トラッカー</h1>
  <p class="sub">「◯◯理解した」とClaudeに伝えると、この台帳が更新される</p>
</header>

<div class="heatstrip" id="heatstrip" aria-label="全用語の習熟度マップ"></div>
<p class="strip-caption">■ 1マス = 1用語。タップで詳細を表示。</p>

<div class="stats" id="stats"></div>

<div class="controls" id="controls">
  <input type="search" id="search" placeholder="用語を検索…">
</div>
<div class="controls" id="cat-controls"></div>

<main id="list"></main>

<div class="modal-backdrop" id="modal-backdrop" hidden>
  <div class="modal-sheet" id="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modal-term">
    <div class="modal-head">
      <div class="modal-title-wrap">
        <span class="modal-term" id="modal-term"></span>
        <span class="level-chip" id="modal-level"></span>
        <span class="cat-chip" id="modal-cat" hidden></span>
      </div>
      <button class="modal-close" id="modal-close" aria-label="閉じる">&times;</button>
    </div>
    <p class="modal-desc" id="modal-desc"></p>
    <div class="related-section" id="modal-related-section" hidden>
      <p class="related-label">関連語</p>
      <div class="related-tags" id="modal-related"></div>
    </div>
    <p class="modal-meta" id="modal-meta"></p>
  </div>
</div>

<script>
const LEVEL_COLORS = ['var(--l0)', 'var(--l1)', 'var(--l2)', 'var(--l3)'];
let DATA = null;
let activeLevel = null; // null = すべて
let activeCategory = null; // null = 全カテゴリ
let lastFocused = null; // モーダルを閉じたとき、開いた元の行にフォーカスを戻す

async function load() {
  const list = document.getElementById('list');
  try {
    const res = await fetch('terms.json?t=' + Date.now());
    if (!res.ok) throw new Error(res.status);
    DATA = await res.json();
    document.getElementById('title').textContent = DATA.meta.title || 'AI用語 学習トラッカー';
    buildControls();
    setupModal();
    render();
  } catch (e) {
    list.innerHTML = '<p class="error">terms.json を読み込めませんでした。GitHub Pages 上、またはローカルサーバー経由で開いてください。</p>';
  }
}

function buildControls() {
  const c = document.getElementById('controls');
  const levels = DATA.meta.levels;
  const frag = document.createDocumentFragment();
  const allBtn = mkChip('すべて', null);
  frag.appendChild(allBtn);
  Object.keys(levels).forEach(k => frag.appendChild(mkChip(levels[k], Number(k))));
  c.insertBefore(frag, document.getElementById('search'));
  document.getElementById('search').addEventListener('input', render);

  // カテゴリーチップ(meta.categoriesがなければ用語から収集)
  const cc = document.getElementById('cat-controls');
  const cats = DATA.meta.categories ||
    [...new Set(DATA.terms.map(t => t.category).filter(Boolean))];
  if (cats.length) {
    cc.appendChild(mkCatChip('全カテゴリ', null));
    cats.forEach(cat => cc.appendChild(mkCatChip(cat, cat)));
  } else {
    cc.hidden = true;
  }
}

function mkChip(label, level) {
  const b = document.createElement('button');
  b.className = 'chip';
  b.textContent = label;
  b.setAttribute('aria-pressed', String(activeLevel === level));
  b.addEventListener('click', () => {
    activeLevel = (activeLevel === level) ? null : level;
    document.querySelectorAll('#controls .chip').forEach(x => x.setAttribute('aria-pressed', 'false'));
    if (activeLevel !== null || label === 'すべて') b.setAttribute('aria-pressed', 'true');
    render();
  });
  return b;
}

function mkCatChip(label, cat) {
  const b = document.createElement('button');
  b.className = 'chip';
  b.textContent = label;
  b.setAttribute('aria-pressed', String(activeCategory === cat));
  b.addEventListener('click', () => {
    activeCategory = (activeCategory === cat) ? null : cat;
    document.querySelectorAll('#cat-controls .chip').forEach(x => x.setAttribute('aria-pressed', 'false'));
    if (activeCategory !== null || cat === null) b.setAttribute('aria-pressed', 'true');
    render();
  });
  return b;
}

function render() {
  const terms = DATA.terms;
  const q = document.getElementById('search').value.trim().toLowerCase();

  // ヒートストリップ
  const strip = document.getElementById('heatstrip');
  strip.innerHTML = '';
  terms.forEach((t, i) => {
    const cell = document.createElement('button');
    cell.className = 'cell';
    cell.style.background = LEVEL_COLORS[t.level] || LEVEL_COLORS[0];
    cell.title = t.term + ' — ' + DATA.meta.levels[t.level];
    cell.setAttribute('aria-label', cell.title);
    cell.addEventListener('click', () => openModal(i));
    strip.appendChild(cell);
  });

  // サマリー
  const counts = [0, 0, 0, 0];
  terms.forEach(t => counts[t.level]++);
  const stats = document.getElementById('stats');
  stats.innerHTML = '';
  Object.keys(DATA.meta.levels).forEach(k => {
    const d = document.createElement('div');
    d.className = 'stat';
    d.innerHTML = '<div class="num">' + counts[k] + '</div>' +
      '<div class="label"><span class="dot" style="background:' + LEVEL_COLORS[k] + '"></span>' +
      DATA.meta.levels[k] + '</div>';
    stats.appendChild(d);
  });

  // 一覧(コンパクト行)
  const list = document.getElementById('list');
  list.innerHTML = '';
  let shown = 0;
  terms.forEach((t, i) => {
    if (activeLevel !== null && t.level !== activeLevel) return;
    if (activeCategory !== null && t.category !== activeCategory) return;
    if (q && !(t.term.toLowerCase().includes(q) || t.description.toLowerCase().includes(q))) return;
    shown++;
    const row = document.createElement('button');
    row.className = 'term-row';
    row.innerHTML =
      '<span class="term-name">' + esc(t.term) + '</span>' +
      '<span class="level-chip lv' + t.level + '">' + DATA.meta.levels[t.level] + '</span>';
    row.addEventListener('click', () => openModal(i));
    list.appendChild(row);
  });
  if (!shown) list.innerHTML = '<p class="empty">該当する用語がありません。</p>';
}

/* --- モーダル --- */

function setupModal() {
  const backdrop = document.getElementById('modal-backdrop');
  document.getElementById('modal-close').addEventListener('click', closeModal);
  backdrop.addEventListener('click', e => {
    if (e.target === backdrop) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !backdrop.hidden) closeModal();
  });
}

function openModal(index) {
  const t = DATA.terms[index];
  if (!t) return;
  const backdrop = document.getElementById('modal-backdrop');
  if (backdrop.hidden) lastFocused = document.activeElement;

  document.getElementById('modal-term').textContent = t.term;
  const chip = document.getElementById('modal-level');
  chip.className = 'level-chip lv' + t.level;
  chip.textContent = DATA.meta.levels[t.level];
  const catChip = document.getElementById('modal-cat');
  if (t.category) {
    catChip.textContent = t.category;
    catChip.hidden = false;
  } else {
    catChip.hidden = true;
  }
  document.getElementById('modal-desc').textContent = t.description;
  document.getElementById('modal-meta').textContent = 'updated ' + (t.updated || '-');

  const section = document.getElementById('modal-related-section');
  const tags = document.getElementById('modal-related');
  tags.innerHTML = '';
  const related = (t.related || []).filter(name => DATA.terms.some(x => x.term === name));
  if (related.length) {
    related.forEach(name => {
      const tag = document.createElement('button');
      tag.className = 'related-tag';
      tag.textContent = name;
      tag.addEventListener('click', () => {
        openModal(DATA.terms.findIndex(x => x.term === name));
      });
      tags.appendChild(tag);
    });
    section.hidden = false;
  } else {
    section.hidden = true;
  }

  backdrop.hidden = false;
  document.body.classList.add('modal-open');
  document.getElementById('modal-sheet').scrollTop = 0;
  document.getElementById('modal-close').focus();
}

function closeModal() {
  document.getElementById('modal-backdrop').hidden = true;
  document.body.classList.remove('modal-open');
  if (lastFocused && document.contains(lastFocused)) lastFocused.focus();
  lastFocused = null;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

load();
</script>
</body>
</html>
